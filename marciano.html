<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Roc Marciano — Hempstead, Long Island. L'architecte. Godfather of the Underground.">
  <title>ROC MARCIANO — ASH & STEEL</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ASH&STEEL">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    .artist-page-hero { max-width:900px; margin:0 auto; padding:4rem 1.5rem 2rem; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05); }
    .artist-page-eyebrow { font-family:'Rajdhani',sans-serif; font-size:0.75rem; letter-spacing:0.25em; text-transform:uppercase; color:#b8960c; margin-bottom:1rem; }
    .artist-page-name { font-family:'Bebas Neue',sans-serif; font-size:clamp(4rem,12vw,8rem); line-height:0.9; color:var(--blanc); letter-spacing:0.05em; margin:0 0 1.5rem; }
    .artist-page-meta { font-family:'Rajdhani',sans-serif; font-size:0.85rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--acier); }
    .artist-page-meta span.accent { color:#b8960c; }
    .artist-page-tagline { font-family:'Rajdhani',sans-serif; font-style:italic; font-size:1.05rem; color:var(--blanc2); max-width:640px; margin:1.5rem auto 0; line-height:1.5; }
    .artist-page-section { max-width:780px; margin:0 auto; padding:3rem 1.5rem; }
    .artist-page-section h2 { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--blanc); letter-spacing:0.1em; font-weight:400; margin:0 0 1.5rem; border-left:3px solid #b8960c; padding-left:1rem; }
    .artist-bio-long p { font-family:'Rajdhani',sans-serif; font-size:1.05rem; line-height:1.75; color:var(--blanc2); margin-bottom:1.5rem; }
    .artist-quote { border-left:3px solid #b8960c; padding:1.5rem 1.5rem 1.5rem 2rem; margin:2rem 0; background:var(--noir2); }
    .artist-quote-text { font-family:'Rajdhani',sans-serif; font-style:italic; font-size:1.2rem; line-height:1.6; color:var(--blanc); margin-bottom:0.75rem; }
    .artist-quote-source { font-family:'Rajdhani',sans-serif; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:#b8960c; }
    .artist-why { background:var(--noir2); border:1px solid rgba(184,150,12,0.2); padding:1.75rem; margin:2rem 0; }
    .artist-why p { font-family:'Rajdhani',sans-serif; font-size:1rem; line-height:1.7; color:var(--blanc2); margin:0; }
    .artist-playlists-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:0.8rem; }
    .artist-disco-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:0.6rem; }
    .btn-back-home { display:inline-block; font-family:'Rajdhani',sans-serif; font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--acier); text-decoration:none; padding:0.5rem 1rem; border:1px solid rgba(255,255,255,0.1); transition:all 0.2s; }
    .btn-back-home:hover { color:var(--blanc); border-color:#b8960c; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><a href="index.html" style="color:inherit;text-decoration:none;">ASH<span>&</span>STEEL</a></div>
    <ul class="nav-links">
      <li><a href="index.html#playlists">Playlists</a></li>
      <li><a href="index.html#artistes" class="active">Artistes</a></li>
      <li><a href="index.html#discographies">Discographies</a></li>
    </ul>
  </nav>

  <header class="artist-page-hero">
    <div style="margin-bottom:1.5rem;"><a href="index.html" class="btn-back-home">← Retour accueil</a></div>
    <div class="artist-page-eyebrow" id="artistEyebrow">Chargement…</div>
    <h1 class="artist-page-name" id="artistName">ROC MARCIANO</h1>
    <div class="artist-page-meta" id="artistMeta"></div>
    <div class="artist-page-tagline" id="artistTagline"></div>
  </header>

  <section class="artist-page-section">
    <h2>Biographie</h2>
    <div class="artist-bio-long" id="artistBioLong"></div>
  </section>

  <section class="artist-page-section" style="padding-top:0;">
    <div class="artist-quote">
      <div class="artist-quote-text" id="artistQuote"></div>
      <div class="artist-quote-source" id="artistQuoteSource"></div>
    </div>
  </section>

  <section class="artist-page-section" style="padding-top:0;">
    <h2>Pourquoi dans ASH & STEEL</h2>
    <div class="artist-why"><p id="artistWhy"></p></div>
  </section>

  <div class="divider"></div>

  <section class="artist-page-section">
    <h2>Playlists dédiées</h2>
    <div class="artist-playlists-grid" id="artistPlaylists"></div>
  </section>

  <div class="divider"></div>

  <section class="artist-page-section">
    <h2>Discographie</h2>
    <div class="artist-disco-grid" id="artistDisco"></div>
  </section>

  <footer class="footer">
    <div class="footer-logo">ASH<span>&</span>STEEL</div>
    <div class="footer-note">Streaming via YouTube · macdubh28.github.io/ash-and-steel</div>
  </footer>

  <div id="yt-player-wrap">
    <div class="player-progress"><div class="player-progress-bar" id="progressBar"></div></div>
    <div id="yt-player-frame"></div>
    <div class="player-thumb" id="playerThumb">◆</div>
    <div class="player-info">
      <div class="player-track" id="playerTrack">–</div>
      <div class="player-artist" id="playerArtist">Sélectionner une playlist</div>
    </div>
    <div class="player-playlist" id="playerPlaylist">–</div>
    <div class="player-controls">
      <button class="player-btn" id="btnPrev">&#9664;&#9664;</button>
      <button class="player-btn main" id="btnPlay">&#9654;</button>
      <button class="player-btn" id="btnNext">&#9654;&#9654;</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const ARTIST_ID = 'marciano';
    const artist = ASH_DATA.artists[ARTIST_ID];
    const accentColor = '#b8960c';

    document.getElementById('artistEyebrow').textContent = artist.origin + ' · ' + artist.years;
    document.getElementById('artistName').textContent = artist.name.toUpperCase();
    document.getElementById('artistMeta').innerHTML = '<span class="accent">' + artist.origin + '</span> &nbsp;·&nbsp; ' + artist.years;
    document.getElementById('artistTagline').textContent = artist.bio;

    document.getElementById('artistBioLong').innerHTML = artist.bioLong.split('\n\n').map(p => '<p>' + p + '</p>').join('');
    document.getElementById('artistQuote').textContent = '« ' + artist.quote + ' »';
    document.getElementById('artistQuoteSource').textContent = '— ' + artist.quoteSource;
    document.getElementById('artistWhy').textContent = artist.whyHere;

    // Playlists liées : on regarde où Roc Marciano / Marci apparaît
    const relatedPlaylists = ASH_DATA.playlists.filter(pl =>
      pl.tracks.some(t => t.artist && (t.artist.toLowerCase().includes('marciano') || t.artist.toLowerCase().includes('marci')))
    );
    const playlistsContainer = document.getElementById('artistPlaylists');
    if (relatedPlaylists.length === 0) {
      playlistsContainer.innerHTML = '<div style="color:var(--acier);font-family:\'Rajdhani\',sans-serif;font-size:0.9rem;">Roc Marciano apparaît dans plusieurs playlists transversales. Voir la section Playlists sur l\'accueil.</div>';
    } else {
      playlistsContainer.innerHTML = relatedPlaylists.map(pl => `
        <a href="index.html#playlists" style="text-decoration:none;">
          <div class="playlist-card" data-id="${pl.id}" style="cursor:pointer;">
            <div class="card-inner">
              <span class="card-icon">${pl.icon}</span>
              <div class="card-title">${pl.title}</div>
              <div class="card-subtitle">${pl.subtitle}</div>
            </div>
            <div class="card-footer">
              <span class="card-count">${pl.tracks.length} titres</span>
            </div>
          </div>
        </a>`).join('');
    }

    document.getElementById('artistDisco').innerHTML = artist.albums.map(album => `
      <div style="background:var(--noir2);border:1px solid rgba(255,255,255,0.05);padding:0.75rem 1rem;border-left:2px solid ${album.type === 'LP' ? accentColor : 'rgba(255,255,255,0.1)'};">
        <div style="font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:600;color:var(--blanc2);margin-bottom:0.2rem;">${album.title}</div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--acier);">
          ${album.year}${album.type !== 'LP' ? ` · <span style="color:var(--acier2);">${album.type}</span>` : ''}${album.feat ? ` · feat. ${album.feat}` : ''}
        </div>
      </div>`).join('');
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/ash-and-steel/sw.js', { scope: '/ash-and-steel/' })
          .then(reg => console.log('SW OK:', reg.scope))
          .catch(err => console.log('SW erreur:', err));
      });
    }
  </script>
</body>
</html>
